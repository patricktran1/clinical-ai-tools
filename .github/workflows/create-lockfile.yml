name: Create reproducible npm lockfile

on:
  push:
    branches: [chore/strengthen-actions-evidence]
    paths:
      - '.github/workflows/create-lockfile.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: clinical-evidence-lockfile-creation
  cancel-in-progress: false

jobs:
  create-lockfile:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          ref: chore/strengthen-actions-evidence

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Generate lockfile
        run: npm install --no-audit --no-fund

      - name: Verify and commit lockfile
        shell: bash
        run: |
          changed="$(git status --short)"
          test "$changed" = '?? package-lock.json'
          npm ci --no-audit --no-fund
          git diff --check
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add package-lock.json
          git commit -m 'Add reproducible npm lockfile'
          git push origin HEAD:chore/strengthen-actions-evidence
