name: Welcome contributor

on:
  pull_request_target:
    types: [opened]

permissions:
  contents: read
  pull-requests: write

jobs:
  welcome:
    if: >-
      github.event.pull_request.author_association == 'FIRST_TIME_CONTRIBUTOR' ||
      github.event.pull_request.author_association == 'FIRST_TIMER'
    runs-on: ubuntu-latest
    steps:
      - name: Post contribution guidance
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: [
                `Thanks for contributing, @${context.payload.pull_request.user.login}.`,
                '',
                'A maintainer will review the deterministic evidence, compatibility boundary, and safety scope of this change.',
                '',
                'Before review, please confirm that `npm run validate` passes and that the pull request contains no patient data, credentials, or unsupported clinical claims.',
                '',
                'The contributor sprint and review ladder are documented in `docs/CONTRIBUTOR_SPRINT.md`.',
              ].join('\n'),
            });
